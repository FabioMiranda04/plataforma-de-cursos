<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout de Pagamento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .checkout-container {
            max-width: 800px;
            margin: 3rem auto;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            padding: 2.5rem;
            border: 1px solid var(--border-color);
        }

        .plan-card {
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .plan-card:hover {
            border-color: var(--primary-color);
        }

        .plan-card.selected {
            border-color: var(--primary-color);
            background-color: #f0f4ff;
        }
    </style>
</head>

<body>

    <header class="top-navbar">
        <a href="index.html" class="brand-logo">
            <i class="fa-solid fa-graduation-cap"></i> MegaCursos
        </a>
        <a href="index.html" class="btn btn-outline-secondary btn-sm" style="max-height: 35px;"><i
                class="fa-solid fa-arrow-left"></i> Voltar</a>
    </header>

    <div class="checkout-container">
        <h2 class="section-title"><i class="fa-solid fa-credit-card text-primary me-2"></i> Finalizar Assinatura</h2>

        <form id="paymentForm">
            <h5 class="mb-3 mt-4">1. Escolha o Plano</h5>
            <div class="row mb-4" id="planosContainer">
                <!-- Planos renderizados aqui via JS -->
            </div>

            <h5 class="mb-3">2. Dados de Pagamento</h5>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Usuário (Simulação)</label>
                    <select id="userSelect" class="form-select" required>
                        <option value="">Selecione quem está pagando...</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Método de Pagamento</label>
                    <select id="metodoPagamento" class="form-select" required>
                        <option value="Cartao de Credito">Cartão de Crédito</option>
                        <option value="PIX">PIX</option>
                        <option value="Boleto">Boleto (Simulação)</option>
                    </select>
                </div>
            </div>

            <div class="mt-4 pt-3 border-top text-end">
                <h4 class="mb-3" id="totalValue">Total: R$ 0,00</h4>
                <button type="submit" class="btn btn-primary-custom btn-lg"><i class="fa-solid fa-lock"></i> Processar
                    Pagamento</button>
            </div>
        </form>
    </div>

    <!-- Modal Sucesso -->
    <div class="modal fade" id="successModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center p-4">
                <div class="modal-body">
                    <i class="fa-solid fa-circle-check text-success" style="font-size: 4rem; margin-bottom: 1rem;"></i>
                    <h4>Pagamento Aprovado!</h4>
                    <p class="text-muted">Assinatura gerada e salva no localStorage.</p>
                    <a href="index.html" class="btn btn-primary-custom mt-2">Ir para Dashboard</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/database.js"></script>
    <script src="js/pagamento.js"></script>
</body>

</html>
