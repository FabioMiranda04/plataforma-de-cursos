<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaCursos — Plataforma de Cursos Online</title>
    <meta name="description" content="Plataforma de cursos online com gerenciamento completo de usuários, cursos, módulos e matrículas.">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Estilos Customizados -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- Header Principal -->
    <header class="top-navbar">
        <a href="#" class="brand-logo" onclick="navigate('dashboard'); return false;">
            <i class="fa-solid fa-graduation-cap"></i>
            MegaCursos
        </a>
        <div class="user-profile" id="userProfileBlock" style="display: none; cursor: pointer;"
            onclick="navigate('perfil')">
            <div class="user-info text-end">
                <span class="user-name" id="loggedUserName">Usuário</span>
                <span class="user-role">Conectado</span>
            </div>
            <img id="loggedUserAvatar" src="https://ui-avatars.com/api/?name=User&background=4361ee&color=fff"
                alt="Usuário">
            <i class="fa-solid fa-gear text-muted"></i>
        </div>
    </header>

    <!-- Alerta Global -->
    <div id="alerta" class="alert d-none mx-3 mt-2" role="alert" style="position:sticky;top:0;z-index:1050;"></div>

    <!-- Nav Tabs -->
    <nav class="nav-tabs-custom" id="mainTabs" style="display: none;">
        <a class="nav-link active" onclick="navigate('dashboard')" data-target="dashboard">
            <i class="fa-solid fa-chart-line me-1"></i>Dashboard
        </a>
        <a class="nav-link" onclick="navigate('meuscursos')" data-target="meuscursos">
            <i class="fa-solid fa-book-open me-1"></i>Meus Cursos
        </a>
        <a class="nav-link" onclick="navigate('cursos')" data-target="cursos">
            <i class="fa-solid fa-th me-1"></i>Galeria
        </a>
        <!-- Admin Dropdown -->
        <div class="dropdown">
            <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="#" role="button" id="adminDropdown">
                <i class="fa-solid fa-shield-halved me-1"></i>Admin
            </a>
            <ul class="dropdown-menu shadow" aria-labelledby="adminDropdown">
                <li><h6 class="dropdown-header">Cadastros</h6></li>
                <li><a class="dropdown-item" onclick="navigate('admin-usuarios')"><i class="fa-solid fa-users fa-fw me-2 text-primary"></i>Usuários</a></li>
                <li><a class="dropdown-item" onclick="navigate('admin-cursos')"><i class="fa-solid fa-graduation-cap fa-fw me-2 text-success"></i>Cursos</a></li>
                <li><a class="dropdown-item" onclick="navigate('admin-categorias')"><i class="fa-solid fa-tags fa-fw me-2 text-warning"></i>Categorias</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><h6 class="dropdown-header">Conteúdo</h6></li>
                <li><a class="dropdown-item" onclick="navigate('admin-modulos')"><i class="fa-solid fa-layer-group fa-fw me-2 text-info"></i>Módulos</a></li>
                <li><a class="dropdown-item" onclick="navigate('admin-aulas')"><i class="fa-solid fa-video fa-fw me-2 text-danger"></i>Aulas</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><h6 class="dropdown-header">Financeiro</h6></li>
                <li><a class="dropdown-item" onclick="navigate('admin-matriculas')"><i class="fa-solid fa-id-card fa-fw me-2 text-purple"></i>Matrículas</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content App -->
    <main class="main-container" id="app-content">
        <!-- O conteúdo será injetado pelo JavaScript aqui -->
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/main.mjs"></script>
</body>

</html>
