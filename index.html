<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Cursos Onlines</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Estilos Customizados -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Header Principal -->
    <header class="top-navbar">
        <a href="#" class="brand-logo">
            <i class="fa-solid fa-graduation-cap"></i>
            MegaCursos
        </a>
        <div class="user-profile" id="userProfileBlock" style="display: none; cursor: pointer;" onclick="app.navigate('perfil')">
            <div class="user-info text-end">
                <span class="user-name" id="loggedUserName">Fábio Miranda</span>
                <span class="user-role">Conectado</span>
            </div>
            <img id="loggedUserAvatar" src="https://ui-avatars.com/api/?name=User&background=4361ee&color=fff" alt="Usuário">
            <i class="fa-solid fa-gear text-muted"></i>
        </div>
    </header>

    <!-- Nav Tabs -->
    <nav class="nav-tabs-custom" id="mainTabs" style="display: none;">
        <a class="nav-link active" onclick="app.navigate('dashboard')" data-target="dashboard">Dashboard</a>
        <a class="nav-link" onclick="app.navigate('meuscursos')" data-target="meuscursos">Meus Cursos</a>
        <a class="nav-link" onclick="app.navigate('cursos')" data-target="cursos">Galeria de Cursos</a>
        <a class="nav-link" onclick="app.navigate('usuarios')" data-target="usuarios">Usuários</a>
    </nav>

    <!-- Main Content App -->
    <main class="main-container" id="app-content">
        <!-- O conteúdo será injetado pelo JavaScript aqui -->
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/database.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
